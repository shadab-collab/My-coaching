<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shadab Coaching Centre</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  
  <!-- NAVBAR -->
  <nav>
    <span class="logo">📚 Shadab Coaching Centre</span>
    <button class="btn-add" onclick="openAddModal()">+ Student</button>
  </nav>
  
  <!-- SEARCH & FILTER -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 नाम खोजें..." oninput="filterStudents()" />
    <select id="filterDue" onchange="filterStudents()">
      <option value="all">सभी</option>
      <option value="due">Due बाकी</option>
      <option value="1">1 तारीख</option>
      <option value="15">15 तारीख</option>
      <option value="1-5">Batch 1-5</option>
      <option value="6-8">Batch 6-8</option>
      <option value="9">Batch 9</option>
      <option value="10">Batch 10</option>
      <option value="CBSE">CBSE</option>
    </select>
  </div>
  
  <!-- STUDENT LIST -->
  <div class="container">
    <div id="studentList"></div>
  </div>
  
  <!-- ADD STUDENT MODAL -->
  <div class="modal" id="addModal">
    <div class="modal-box">
      <h2>नया Student जोड़ें</h2>
      <div class="form-group">
        <input type="text" id="newName" placeholder="Student का नाम *" />
      </div>
      <div class="form-group">
        <input type="text" id="newIdentity" placeholder="पहचान (Family code / Guardian)" />
      </div>
      <div class="form-group">
        <input type="text" id="newFamilyCode" placeholder="Family Code (AA, KA, MITTHU...)" />
      </div>
      
      <!-- FEE TYPE OPTIONS -->
      <div class="fee-type-section">
        <p class="fee-type-title">Fee Type चुनें:</p>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="feeTypeRadio" id="radioIndividual" value="Individual" checked />
            <span>Individual Fee (अकेला)</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="feeTypeRadio" id="radioFamily" value="Family" />
            <span>Family Fee (परिवार)</span>
          </label>
        </div>
      </div>
      
      <div class="form-group">
        <input type="number" id="newFee" placeholder="Monthly Fee (₹)" />
      </div>
      <div class="form-group">
        <select id="newBatch">
          <option value="">Batch select करें</option>
          <option value="1-5">Class 1-5</option>
          <option value="6-8">Class 6-8</option>
          <option value="9">Class 9</option>
          <option value="10">Class 10</option>
          <option value="CBSE">CBSE</option>
        </select>
      </div>
      <div class="form-group">
        <select id="newDueDate">
          <option value="1">1 तारीख</option>
          <option value="15">15 तारीख</option>
        </select>
      </div>
      <div class="form-group">
        <label style="font-size: 0.8rem; color:#666; display:block; margin-bottom:0.2rem;">Join Date:</label>
        <input type="date" id="newJoinDate" />
      </div>
      <div class="modal-btns">
        <button class="btn-confirm" onclick="addStudent()">Save</button>
        <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      </div>
    </div>
  </div>
  
  <!-- DIARY BASED HISAB LEDGER MODAL -->
  <div class="modal" id="hisabModal">
    <div class="modal-box hisab-box">
      <div class="hisab-header">
        <h2 id="hisabStudentTitle">Nazeeb का हिसाब</h2>
        <span id="hisabFeeTypeBadge" class="badge badge-blue">Individual Fee</span>
      </div>
      
      <!-- डायरी स्टाइल रिकॉर्ड टेबल -->
      <div class="diary-table-container">
        <table class="diary-table">
          <thead>
            <tr>
              <th>कब लगा (Due)</th>
              <th>कब दिये (Paid)</th>
              <th>स्टेटस / एक्शन</th>
            </tr>
          </thead>
          <tbody id="hisabTableBody">
            <!-- यहाँ डायरी का डेटा स्क्रिप्ट द्वारा रेंडर होगा -->
          </tbody>
        </table>
      </div>
      
      <div class="modal-btns" style="margin-top: 1.5rem;">
        <button class="btn-cancel" onclick="closeModal('hisabModal')" style="width: 100%;">बंद करें</button>
      </div>
    </div>
  </div>
  
  <!-- MARK FEES MODAL -->
  <div class="modal" id="markModal">
    <div class="modal-box">
      <h2>Fees Mark करें</h2>
      <p id="markInfo" style="margin-bottom:0.8rem; font-weight:600; color:#1a7a4a"></p>
      <div class="form-group">
        <select id="markStatus">
          <option value="paid">✅ Paid (पूरा)</option>
          <option value="partial">⚠️ Partial (आंशिक)</option>
          <option value="advance">⏭️ Advance</option>
          <option value="unpaid">❌ Unpaid</option>
        </select>
      </div>
      <div class="form-group">
        <input type="number" id="markAmount" placeholder="Amount (₹)" />
      </div>
      <div class="form-group">
        <input type="text" id="markNote" placeholder="Note (जैसे +200 जमा)" />
      </div>
      <div class="modal-btns">
        <button class="btn-confirm" onclick="saveFees()">Save</button>
        <button class="btn-cancel" onclick="closeModal('markModal')">Cancel</button>
      </div>
    </div>
  </div>
  
  <!-- CUSTOM NOTIFICATION MODAL -->
  <div class="modal" id="customAlertModal">
    <div class="modal-box" style="max-width: 400px; text-align: center;">
      <h3 style="color: var(--green); margin-bottom: 1rem; font-size: 1.2rem;">सूचना 📢</h3>
      <p id="customAlertMessage" style="margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.4; color: #555;"></p>
      <div class="modal-btns">
        <button class="btn-confirm" onclick="closeModal('customAlertModal')" style="width: 100%;">ठीक है</button>
      </div>
    </div>
  </div>
  
  <!-- CUSTOM CONFIRMATION MODAL -->
  <div class="modal" id="customConfirmModal">
    <div class="modal-box" style="max-width: 400px; text-align: center;">
      <h3 style="color: var(--red); margin-bottom: 1rem; font-size: 1.2rem;">पुष्टिकरण ⚠️</h3>
      <p id="customConfirmMessage" style="margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.4; color: #555;"></p>
      <div class="modal-btns">
        <button id="customConfirmYesBtn" class="btn-danger-confirm" style="flex:1;">हाँ, हटाएं</button>
        <button class="btn-cancel" onclick="closeModal('customConfirmModal')" style="flex:1;">रद्द करें</button>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>

</html>
