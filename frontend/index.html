<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadab Coaching Centre</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  
  <!-- NAVBAR -->
  <nav>
    <span class="logo">📚 Shadab Coaching Centre</span>
    <button class="btn-add" onclick="openAddModal()">+ Student</button>
  </nav>
  
  <!-- SEARCH & FILTER -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 नाम खोजें..." oninput="filterStudents()" />
    <select id="filterDue" onchange="filterStudents()">
      <option value="all">सभी</option>
      <option value="due">Due बाकी</option>
      <option value="1">1 तारीख</option>
      <option value="15">15 तारीख</option>
      <option value="1-5">Batch 1-5</option>
      <option value="6-8">Batch 6-8</option>
      <option value="9">Batch 9</option>
      <option value="10">Batch 10</option>
      <option value="CBSE">CBSE</option>
    </select>
  </div>
  
  <!-- STUDENT LIST -->
  <div class="container">
    <div id="studentList"></div>
  </div>
  
  <!-- ADD STUDENT MODAL -->
  <div class="modal" id="addModal">
    <div class="modal-box">
      <h2>नया Student जोड़ें</h2>
      <input type="text" id="newName" placeholder="Student का नाम *" />
      <input type="text" id="newIdentity" placeholder="पहचान (Family code / Guardian)" />
      <input type="text" id="newFamilyCode" placeholder="Family Code (AA, KA, MITTHU...)" />
      
      <!-- FEE TYPE OPTIONS (FAMILY vs INDIVIDUAL) -->
      <div class="fee-type-section" style="margin-bottom: 1rem; border: 1px solid #ddd; padding: 0.8rem; border-radius: 8px;">
        <p style="font-weight:600; font-size:0.85rem; margin-bottom:0.5rem; color:#1a7a4a">Fee Type चुनें:</p>
        <div style="display:flex; gap:1.5rem;">
          <label style="display:flex; align-items:center; gap:0.4rem; font-size:0.9rem; cursor:pointer">
            <input type="radio" name="feeTypeRadio" id="radioIndividual" value="Individual" checked onchange="toggleFamilyFeeUI()" />
            Individual Fee (अकेला)
          </label>
          <label style="display:flex; align-items:center; gap:0.4rem; font-size:0.9rem; cursor:pointer">
            <input type="radio" name="feeTypeRadio" id="radioFamily" value="Family" onchange="toggleFamilyFeeUI()" />
            Family Fee (परिवार)
          </label>
        </div>
      </div>
      
      <input type="number" id="newFee" placeholder="Monthly Fee (₹)" />
      <select id="newBatch">
        <option value="">Batch select करें</option>
        <option value="1-5">Class 1-5</option>
        <option value="6-8">Class 6-8</option>
        <option value="9">Class 9</option>
        <option value="10">Class 10</option>
        <option value="CBSE">CBSE</option>
      </select>
      <select id="newDueDate">
        <option value="1">1 तारीख</option>
        <option value="15">15 तारीख</option>
      </select>
      <input type="date" id="newJoinDate" />
      <div class="modal-btns">
        <button onclick="addStudent()">Save</button>
        <button onclick="closeModal('addModal')">Cancel</button>
      </div>
    </div>
  </div>
  
  <!-- DIARY BASED HISAB LEDGER MODAL -->
  <div class="modal" id="hisabModal">
    <div class="modal-box" style="max-width: 600px;">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1a7a4a; padding-bottom: 0.5rem; margin-bottom: 1rem;">
        <h2 id="hisabStudentTitle" style="margin:0;">Nazeeb का हिसाब</h2>
        <span id="hisabFeeTypeBadge" class="badge badge-blue">Individual Fee</span>
      </div>
      
      <!-- डायरी स्टाइल रिकॉर्ड टेबल -->
      <div class="diary-table-container">
        <table class="diary-table">
          <thead>
            <tr>
              <th>कब लगा (Due Date)</th>
              <th>कब दिये (Paid Date)</th>
              <th>स्टेटस / एक्शन</th>
            </tr>
          </thead>
          <tbody id="hisabTableBody">
            <!-- यहाँ डायरी का डेटा स्क्रिप्ट द्वारा रेंडर होगा -->
          </tbody>
        </table>
      </div>
      
      <div class="modal-btns" style="margin-top: 1.5rem;">
        <button onclick="closeModal('hisabModal')" style="background:#eee; color:#0f2d1f;">बंद करें</button>
      </div>
    </div>
  </div>
  
  <!-- MARK FEES MODAL -->
  <div class="modal" id="markModal">
    <div class="modal-box">
      <h2>Fees Mark करें</h2>
      <p id="markInfo" style="margin-bottom:0.8rem;font-weight:600; color:#1a7a4a"></p>
      <select id="markStatus">
        <option value="paid">✅ Paid (पूरा)</option>
        <option value="partial">⚠️ Partial (आंशिक)</option>
        <option value="advance">⏭️ Advance</option>
        <option value="unpaid">❌ Unpaid</option>
      </select>
      <input type="number" id="markAmount" placeholder="Amount (₹)" />
      <input type="text" id="markNote" placeholder="Note (जैसे +200 जमा)" />
      <div class="modal-btns">
        <button onclick="saveFees()">Save</button>
        <button onclick="closeModal('markModal')">Cancel</button>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>

</html>
